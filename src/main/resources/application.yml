spring:
  application:
    name: backend
  profiles:
    default: local
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1434;databaseName=${DB_NAME:master};encrypt=${DB_ENCRYPT:false};trustServerCertificate=${DB_TRUST_SERVER_CERTIFICATE:true}}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:${MSSQL_SA_PASSWORD:}}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:0.1}

app:
  security:
    enabled: false
    audience: ${OAUTH2_AUDIENCE:backend-api}
