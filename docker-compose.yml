services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD before starting SQL Server Express}
    ports:
      - "${MSSQL_PORT:-1434}:1433"
    volumes:
      - backend-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b"]
      interval: 5s
      timeout: 5s
      retries: 10

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-backend}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD before starting SQL Server Express}
    entrypoint: ["/bin/bash", "-c"]
    command: >-
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -C
      -Q "IF DB_ID(N'$${DB_NAME}') IS NULL CREATE DATABASE [$${DB_NAME}]" -b
    restart: "no"

volumes:
  backend-sqlserver-data:
